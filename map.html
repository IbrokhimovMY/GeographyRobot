    <title>Davlatlar xaritasi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; }
        .leaflet-popup-content-wrapper { font-family: Arial, sans-serif; }
    </style>
</head>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

        const map = L.map('map').setView([0, 0], 2);

            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

                    "Zambia": "Zambiya",
                    "Zimbabwe": "Zimbabve"

                L.geoJSON(data, {
                    style: function(feature) {
                        return { fillColor: '#3388ff', weight: 1, opacity: 1, color: 'white', fillOpacity: 0.7 };
                    },
                    onEachFeature: function(feature, layer) {
                        const countryName = countryNameMap[feature.properties.name] || feature.properties.name;
                        layer.bindPopup(countryName);
                        layer.on('click', function(e) {
                            Telegram.WebApp.sendData(JSON.stringify({ country: countryName }));
                            Telegram.WebApp.close();
                        });
                    }
                }).addTo(map);
            });

        // Initialize Telegram Web App
        Telegram.WebApp.ready();
    </script>
</body>
</html>
