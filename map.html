<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; }
        .leaflet-popup-content-wrapper { font-family: Arial, sans-serif; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const map = L.map('map').setView([0, 0], 2);

        // CartoDB Voyager — all country labels are in English
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function() {
                        return { fillColor: '#3388ff', weight: 1, opacity: 1, color: 'white', fillOpacity: 0.7 };
                    },
                    onEachFeature: function(feature, layer) {
                        // feature.properties.name is English from this GeoJSON source
                        const name = feature.properties.name || '';
                        layer.bindPopup('<b>' + name + '</b>');
                        layer.on('click', function() {
                            // Send English name; bot maps it to active language internally
                            Telegram.WebApp.sendData(JSON.stringify({ country: name }));
                            Telegram.WebApp.close();
                        });
                    }
                }).addTo(map);
            });

        Telegram.WebApp.ready();
    </script>
</body>
</html>
