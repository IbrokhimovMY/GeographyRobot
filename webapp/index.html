<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Geography Quiz</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson@3/dist/topojson.min.js"></script>

<style>
:root {
  --bg:       var(--tg-theme-bg-color,#17212b);
  --bg2:      var(--tg-theme-secondary-bg-color,#232e3c);
  --text:     var(--tg-theme-text-color,#f5f5f5);
  --hint:     var(--tg-theme-hint-color,#708499);
  --btn:      var(--tg-theme-button-color,#5288c1);
  --btn-text: var(--tg-theme-button-text-color,#fff);
  --link:     var(--tg-theme-link-color,#62acde);
  --green:#4caf50; --red:#f44336; --orange:#ff9800;
  --r:12px; --pad:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;min-height:100vh}
button{cursor:pointer;border:none;outline:none;font-family:inherit}

/* ── screens ─────────────────────────────────────────────── */
.screen{display:none;flex-direction:column;min-height:100vh;padding:var(--pad)}
.screen.active{display:flex}

/* ── cards ───────────────────────────────────────────────── */
.card{background:var(--bg2);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}

/* ── buttons ─────────────────────────────────────────────── */
.btn{display:block;width:100%;padding:14px;border-radius:var(--r);background:var(--btn);color:var(--btn-text);font-size:15px;font-weight:600;text-align:center;transition:.15s}
.btn:active{opacity:.8}
.btn.secondary{background:var(--bg2);color:var(--text)}
.btn.danger{background:rgba(244,67,54,.15);color:var(--red)}
.btn.small{padding:9px 14px;font-size:13px;font-weight:500}
.btn-row{display:grid;gap:8px}
.btn-row.col2{grid-template-columns:1fr 1fr}
.btn-row.col3{grid-template-columns:1fr 1fr 1fr}

/* ── home ─────────────────────────────────────────────────── */
.home-header{text-align:center;padding:20px 0 16px}
.home-header h1{font-size:22px;font-weight:700}
.home-header p{color:var(--hint);font-size:13px;margin-top:4px}
.game-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:16px 8px;background:var(--bg2);border-radius:var(--r);color:var(--text);font-size:13px;font-weight:600;transition:.15s}
.game-btn:active{opacity:.8}
.game-btn .icon{font-size:28px}
.game-btn.featured{background:var(--btn);color:var(--btn-text)}
.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.lang-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.lang-btn{padding:6px 16px;border-radius:20px;background:var(--bg2);color:var(--hint);font-size:13px;font-weight:600;transition:.15s}
.lang-btn.active{background:var(--btn);color:var(--btn-text)}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.setting-row + .setting-row{border-top:1px solid rgba(255,255,255,.06)}
.setting-label{font-size:14px;color:var(--hint)}
.setting-value{font-size:14px;font-weight:600;color:var(--link);cursor:pointer}
.streak-bar{display:flex;justify-content:space-around;padding:4px 0}
.streak-item{text-align:center}
.streak-num{font-size:22px;font-weight:700}
.streak-lbl{font-size:11px;color:var(--hint);margin-top:2px}

/* ── game screen ──────────────────────────────────────────── */
.game-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back-btn{background:var(--bg2);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.game-title{font-size:16px;font-weight:700}
.game-subtitle{font-size:12px;color:var(--hint);margin-top:1px}

/* timer */
.timer-wrap{margin-bottom:14px}
.timer-bar-bg{height:6px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden}
.timer-bar{height:100%;border-radius:3px;background:var(--btn);transition:width .5s linear,background .5s}
.timer-bar.warn{background:var(--orange)}
.timer-bar.danger{background:var(--red)}
.timer-text{font-size:12px;color:var(--hint);text-align:right;margin-top:4px}

/* question */
.question-card{background:var(--bg2);border-radius:var(--r);padding:20px 16px;margin-bottom:14px;text-align:center;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.flag-display{font-size:80px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.capital-display{font-size:28px;font-weight:700}
.hint-text{font-size:14px;line-height:1.55;color:var(--text);text-align:left;width:100%}
.hint-label{font-size:11px;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;text-align:left;width:100%}
.hint-source{font-size:11px;color:var(--link);margin-top:6px;text-align:left;width:100%}

/* input */
.input-wrap{position:relative;margin-bottom:10px}
.answer-input{width:100%;padding:13px 50px 13px 14px;border-radius:var(--r);background:var(--bg2);border:2px solid transparent;color:var(--text);font-size:15px;outline:none;transition:.2s}
.answer-input:focus{border-color:var(--btn)}
.answer-input.correct{border-color:var(--green)}
.answer-input.wrong{border-color:var(--red)}
.submit-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--btn);color:var(--btn-text);border-radius:8px;padding:6px 10px;font-size:18px;line-height:1}

/* attempts */
.attempts{display:flex;justify-content:center;gap:8px;margin-bottom:14px}
.attempt-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.15);transition:.2s}
.attempt-dot.used{background:var(--red)}
.attempt-dot.remaining{background:rgba(255,255,255,.3)}

/* hints section */
.hints-section{margin-bottom:14px}
.hint-item{background:var(--bg2);border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:13px;line-height:1.5;animation:fadeIn .3s}
.hint-item .hi-label{font-size:11px;color:var(--link);font-weight:600;margin-bottom:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── result overlay ──────────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:flex-end;padding:var(--pad)}
.overlay.active{display:flex}
.result-card{background:var(--bg);border-radius:var(--r) var(--r) 0 0;padding:24px var(--pad) calc(var(--pad) + env(safe-area-inset-bottom));width:100%;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
.result-icon{font-size:52px;text-align:center;margin-bottom:12px}
.result-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:6px}
.result-country{text-align:center;font-size:30px;margin-bottom:4px}
.result-sub{text-align:center;font-size:13px;color:var(--hint);margin-bottom:16px}
.result-fact{font-size:13px;line-height:1.6;color:var(--text);background:var(--bg2);border-radius:8px;padding:12px;margin-bottom:16px;display:none}

/* ── picker overlay ──────────────────────────────────────── */
.picker{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:flex-end;padding:var(--pad)}
.picker.active{display:flex}
.picker-card{background:var(--bg);border-radius:var(--r) var(--r) 0 0;padding:20px var(--pad) calc(var(--pad) + env(safe-area-inset-bottom));width:100%;animation:slideUp .25s}
.picker-title{font-size:16px;font-weight:700;margin-bottom:14px}
.picker-options{display:flex;flex-direction:column;gap:8px}
.picker-option{padding:12px 14px;border-radius:8px;background:var(--bg2);font-size:14px;text-align:left;color:var(--text);display:flex;justify-content:space-between;align-items:center}
.picker-option.active-opt{background:rgba(82,136,193,.2);color:var(--btn)}
.picker-option .check{font-size:16px}

/* ── map game ─────────────────────────────────────────────── */
#map-svg-wrap{flex:1;min-height:280px;background:var(--bg2);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
#map-svg-wrap svg{width:100%;height:100%}
.country-path{fill:#3a4a5a;stroke:#1a2634;stroke-width:.5;cursor:pointer;transition:.15s}
.country-path:hover{fill:#4a6a8a}
.country-path.target{fill:var(--btn);animation:pulse 1.2s ease-in-out infinite}
.country-path.correct-flash{fill:var(--green)!important;animation:none}
.country-path.wrong-flash{fill:var(--red)!important;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.currency-display{font-size:22px;font-weight:700;margin:8px 0 4px}
.currency-code{font-size:14px;color:var(--hint);font-family:monospace}
</style>
</head>
<body>

<!-- ═══════════════════════════ HOME ═══════════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <h1>🌍 Geography Quiz</h1>
    <p id="home-sub">Test your world knowledge</p>
  </div>

  <div class="lang-row">
    <button class="lang-btn" data-lang="uz" onclick="setLang('uz')">🇺🇿 UZ</button>
    <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">🇷🇺 RU</button>
    <button class="lang-btn active" data-lang="en" onclick="setLang('en')">🇬🇧 EN</button>
  </div>

  <div class="games-grid">
    <button class="game-btn featured" onclick="startGame('country')">
      <span class="icon">🌍</span>
      <span id="btn-country">Find Country</span>
    </button>
    <button class="game-btn" onclick="startGame('capital')">
      <span class="icon">🏙</span>
      <span id="btn-capital">Find Capital</span>
    </button>
    <button class="game-btn" onclick="startGame('flag')">
      <span class="icon">🚩</span>
      <span id="btn-flag">Flag Game</span>
    </button>
    <button class="game-btn" onclick="startGame('currency')">
      <span class="icon">💰</span>
      <span id="btn-currency">Currency</span>
    </button>
    <button class="game-btn" onclick="startGame('map')">
      <span class="icon">🗺</span>
      <span id="btn-map">Map Game</span>
    </button>
    <button class="game-btn" onclick="startGame('challenge')">
      <span class="icon">🎯</span>
      <span id="btn-challenge">Challenge</span>
    </button>
  </div>

  <div class="card">
    <div class="setting-row">
      <span class="setting-label" id="lbl-region">Region</span>
      <span class="setting-value" id="val-region" onclick="openPicker('region')">All ›</span>
    </div>
    <div class="setting-row">
      <span class="setting-label" id="lbl-difficulty">Difficulty</span>
      <span class="setting-value" id="val-difficulty" onclick="openPicker('difficulty')">Normal ›</span>
    </div>
  </div>

  <div class="card">
    <div class="streak-bar">
      <div class="streak-item">
        <div class="streak-num" id="stat-correct">0</div>
        <div class="streak-lbl" id="lbl-correct">Correct</div>
      </div>
      <div class="streak-item">
        <div class="streak-num" id="stat-streak">🔥0</div>
        <div class="streak-lbl" id="lbl-streak">Streak</div>
      </div>
      <div class="streak-item">
        <div class="streak-num" id="stat-best">0</div>
        <div class="streak-lbl" id="lbl-best">Best</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════ GAME ═══════════════════════════ -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div>
      <div class="game-title" id="game-title">Find Country</div>
      <div class="game-subtitle" id="game-progress">1/195</div>
    </div>
  </div>

  <div class="timer-wrap">
    <div class="timer-bar-bg"><div class="timer-bar" id="timer-bar"></div></div>
    <div class="timer-text" id="timer-text">1:30</div>
  </div>

  <div class="question-card" id="question-card">
    <div class="flag-display" id="q-flag" style="display:none"></div>
    <div class="capital-display" id="q-capital" style="display:none"></div>
    <div class="hint-label" id="q-hint-label" style="display:none"></div>
    <div class="hint-text" id="q-hint" style="display:none"></div>
  </div>

  <div class="input-wrap">
    <input id="answer-input" class="answer-input" type="text"
           autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
           placeholder="…"
           onkeydown="if(event.key==='Enter')submitAnswer()">
    <button class="submit-btn" onclick="submitAnswer()">→</button>
  </div>

  <div class="attempts" id="attempts-row"></div>

  <div class="hints-section" id="hints-section"></div>

  <div class="btn-row col2">
    <button class="btn secondary small" id="hint-btn" onclick="showNextHint()">💡 Hint</button>
    <button class="btn danger small" onclick="giveUp()">✖ Give up</button>
  </div>
</div>

<!-- ═══════════════════════════ RESULT ════════════════════════ -->
<div class="overlay" id="result-overlay">
  <div class="result-card">
    <div class="result-icon" id="res-icon">✅</div>
    <div class="result-title" id="res-title">Correct!</div>
    <div class="result-country" id="res-country"></div>
    <div class="result-sub" id="res-sub"></div>
    <div class="result-fact" id="res-fact"></div>
    <div class="btn-row col2">
      <button class="btn secondary" onclick="closeResult(false)">🏠 Menu</button>
      <button class="btn" id="next-btn" onclick="closeResult(true)">▶ Next</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════ MAP GAME ══════════════════════ -->
<div id="screen-map" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div>
      <div class="game-title" id="map-title">Find Country on Map</div>
      <div class="game-subtitle" id="map-progress">Tap the highlighted country</div>
    </div>
  </div>
  <div class="timer-wrap">
    <div class="timer-bar-bg"><div class="timer-bar" id="map-timer-bar"></div></div>
    <div class="timer-text" id="map-timer-text">1:30</div>
  </div>
  <div class="question-card" style="min-height:60px">
    <div id="map-question" style="font-size:18px;font-weight:700"></div>
    <div id="map-question-sub" style="font-size:13px;color:var(--hint);margin-top:4px"></div>
  </div>
  <div id="map-svg-wrap"></div>
  <div class="attempts" id="map-attempts-row"></div>
  <div class="btn-row col2">
    <button class="btn secondary small" onclick="goHome()">🏠 Menu</button>
    <button class="btn danger small" onclick="giveUpMap()">✖ Give up</button>
  </div>
</div>

<!-- ═══════════════════════════ PICKERS ═══════════════════════ -->
<div class="picker" id="picker-region">
  <div class="picker-card">
    <div class="picker-title" id="picker-region-title">Select Region</div>
    <div class="picker-options" id="picker-region-opts"></div>
  </div>
</div>

<div class="picker" id="picker-difficulty">
  <div class="picker-card">
    <div class="picker-title" id="picker-diff-title">Select Difficulty</div>
    <div class="picker-options" id="picker-diff-opts"></div>
  </div>
</div>

const tg = window.Telegram?.WebApp;

const state = {

  region: 'all',
  difficulty: 'normal',
  usedCountries: new Set(),
  session: { correct: 0, streak: 0, best: 0 },

function detectLang() {
  const l = tg?.initDataUnsafe?.user?.language_code || navigator.language || 'en';
  if (l.startsWith('uz')) return 'uz';
  if (l.startsWith('ru')) return 'ru';
  return 'uz';
}

function T(key) { return (I18N[state.lang] || I18N.en)[key] || key; }

function getDailyChallenge() {
  const today = new Date();
  const seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
  // Simple LCG seeded by date
  let r = seed;
  r = (r * 1664525 + 1013904223) & 0xffffffff;
  r = ((r >>> 0) % GAME_DATA.length);
  return GAME_DATA[r];
}

const TIMERS = {
  country:  {easy:120, normal:90, hard:60},
  capital:  {easy:90,  normal:60, hard:30},
  flag:     {easy:90,  normal:60, hard:40},
  challenge:{easy:120, normal:90, hard:60},
  currency: {easy:120, normal:90, hard:60},

// ══════════════════════════════════════════════════════════
//  GAME START
// ══════════════════════════════════════════════════════════
function getPool() {
  return state.region === 'all'
    ? GAME_DATA
    : GAME_DATA.filter(c => c.continent === state.region);
}

function pickCountry(type) {
  if (type === 'challenge') return state.challengeCountry;
  const pool = getPool();
  const available = pool.filter(c => !state.usedCountries.has(c.key));
  if (!available.length) { state.usedCountries.clear(); return pool[Math.floor(Math.random()*pool.length)]; }
  return available[Math.floor(Math.random()*available.length)];
}

function startGame(type) {
  if (type === 'challenge' && state.challengeDone) {
    showToast(T('challenge_done')); return;
  }
  if (type === 'map') { startMapGame(); return; }

  const country = pickCountry(type);
  if (!country) { showToast('No countries available!'); return; }
  state.usedCountries.add(country.key);

  const duration = TIMERS[type][state.difficulty];
  state.game = {
    type, country, attempts: 0,
    hints: buildLocalHints(type, country),
    hintsFetched: false, wikiSentences: [],
    shownHints: 0,
    timerEnd: Date.now() + duration * 1000,
    timerMax: duration,
    timerInterval: null,
  };

  showScreen('game');
  renderGame();
  startTimer();
}

const CONTINENT_NAMES = {
  africa:{uz:'Afrika',ru:'Африка',en:'Africa'},
  asia:{uz:'Osiyo',ru:'Азия',en:'Asia'},
  europe:{uz:'Yevropa',ru:'Европа',en:'Europe'},
  north_america:{uz:'Shimoliy Amerika',ru:'Северная Америка',en:'North America'},
  south_america:{uz:'Janubiy Amerika',ru:'Южная Америка',en:'South America'},
  oceania:{uz:'Okeaniya',ru:'Океания',en:'Oceania'},
};

function buildLocalHints(type, country) {
  const l = state.lang;
  const hints = [];
  const contObj = CONTINENT_NAMES[country.continent];
  const contText = contObj ? contObj[l] || contObj.en : country.continent;
  const name = country.names[l] || country.names.en;
  const firstLetter = name[0].toUpperCase();
  const letterCount = name.replace(/ /g,'').length;

  // 1. Description (not for flag/currency where it might hint too much)
  if (type !== 'flag' && type !== 'currency') {
    const desc = country.hints[l] || country.hints.en;
    if (desc) hints.push({ label: T('hint_lbl') + ' 1', text: desc });
  }

  // 2. Continent
  hints.push({ label: T('hint_continent'), text: contText });

  // 3. Flag emoji (not for flag game)
  if (type !== 'flag') {
    hints.push({ label: T('hint_flag_hint'), text: country.flag + '  ' + country.flag });
  }

  // 4. Capital (not for capital game)
  if (type !== 'capital') {
    hints.push({ label: T('hint_capital_hint'), text: country.capital });
  }

  // 5. First letter + letter count
  hints.push({ label: T('hint_lbl') + ' 🔤', text: `${firstLetter}... (${letterCount} ${l==='uz'?'harf':l==='ru'?'букв':'letters'})` });

  return hints;
}

// ══════════════════════════════════════════════════════════
//  RENDER GAME
// ══════════════════════════════════════════════════════════
function renderGame() {
  const g = state.game;
  const l = state.lang;

  // Title
  const titles = {country:T('game_country'), capital:T('game_capital'),
                  flag:T('game_flag'), challenge:T('game_challenge'),
                  currency:T('game_currency')};
  document.getElementById('game-title').textContent = titles[g.type];
  document.getElementById('game-progress').textContent =
    `${state.usedCountries.size}/${getPool().length}`;

  // Question
  const flagEl    = document.getElementById('q-flag');
  const capEl     = document.getElementById('q-capital');
  const hintLbl   = document.getElementById('q-hint-label');
  const hintEl    = document.getElementById('q-hint');
  [flagEl, capEl, hintLbl, hintEl].forEach(e => e.style.display='none');

  if (g.type === 'currency') {
    hintLbl.textContent = '💰';
    hintLbl.style.display = 'block';
    const cur = g.country.currency || {};
    hintEl.innerHTML = `<div class="currency-display">${cur.name || '?'}</div><div class="currency-code">${cur.code || ''}</div>`;
    hintEl.style.display = 'block';
  } else if (g.type === 'flag') {
    flagEl.textContent = g.country.flag;
    flagEl.style.display = 'block';
  } else if (g.type === 'capital') {
    capEl.textContent = g.country.capital;
    capEl.style.display = 'block';
  } else {
    // country or challenge: show first hint inline too
    hintLbl.textContent = T('hint_lbl');
    hintLbl.style.display = 'block';
    hintEl.textContent = g.country.hints[l] || g.country.hints.en;
    hintEl.style.display = 'block';
  }

  // Easy mode: show flag hint inline for country game
  if (state.difficulty === 'easy' && (g.type === 'country' || g.type === 'challenge')) {
    flagEl.textContent = g.country.flag;
    flagEl.style.display = 'block';
  }

  // Attempts
  renderAttempts();

  // Input
  const inp = document.getElementById('answer-input');
  inp.value = '';
  inp.className = 'answer-input';
  inp.placeholder = T('input_placeholder');
  setTimeout(() => inp.focus(), 300);

  // Clear hints and reset hint button
  document.getElementById('hints-section').innerHTML = '';
  const hintBtn = document.getElementById('hint-btn');
  if (hintBtn) { hintBtn.textContent = '💡 ' + T('hint_lbl'); hintBtn.disabled = false; }
}

function renderAttempts() {
  const row = document.getElementById('attempts-row');
  row.innerHTML = '';
  for (let i = 0; i < MAX_ATTEMPTS; i++) {
    const d = document.createElement('div');
    d.className = 'attempt-dot ' + (i < state.game.attempts ? 'used' : 'remaining');
    row.appendChild(d);
  }
}

// ══════════════════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════════════════
function startTimer() {
  const g = state.game;
  g.timerInterval = setInterval(() => {
    const remaining = Math.max(0, g.timerEnd - Date.now());
    const pct = remaining / (g.timerMax * 1000) * 100;
    const bar = document.getElementById('timer-bar');
    const txt = document.getElementById('timer-text');
    bar.style.width = pct + '%';
    bar.className = 'timer-bar' + (pct < 20 ? ' danger' : pct < 40 ? ' warn' : '');
    const secs = Math.ceil(remaining / 1000);
    txt.textContent = Math.floor(secs/60) + ':' + String(secs%60).padStart(2,'0');
    if (remaining <= 0) { clearInterval(g.timerInterval); onTimeout(); }
  }, 200);
}

function stopTimer() {
  if (state.game?.timerInterval) clearInterval(state.game.timerInterval);
}

function onTimeout() {
  if (!state.game) return;
  const g = state.game;
  sendResult(g.type, 'timeout', g.country.key);
  showResult('timeout', g.country);
  state.game = null;
}

// ══════════════════════════════════════════════════════════
//  ANSWER
// ══════════════════════════════════════════════════════════
function submitAnswer() {
  if (!state.game) return;
  const input = document.getElementById('answer-input');
  const raw = input.value.trim();
  if (!raw) return;

  const g = state.game;
  const answer = raw.toLowerCase();
  const country = g.country;

  // Check all language forms
  const accepted = [
    country.key.toLowerCase(),
    country.names.en.toLowerCase(),
    country.names.ru.toLowerCase(),
    country.names.uz.toLowerCase(),
  ];

  if (accepted.includes(answer)) {
    stopTimer();
    const isChallenge = g.type === 'challenge';
    if (isChallenge) state.challengeDone = true;
    sendResult(g.type, 'correct', country.key);
    // Update streak
    state.session.correct++;
    state.session.streak++;
    if (state.session.streak > state.session.best) state.session.best = state.session.streak;
    updateSessionStats();
    input.className = 'answer-input correct';
    state.game = null;
    setTimeout(() => showResult('correct', country), 200);
  } else {
    g.attempts++;
    input.className = 'answer-input wrong';
    renderAttempts();
    if (g.attempts >= MAX_ATTEMPTS) {
      stopTimer();
      sendResult(g.type, 'wrong', country.key);
      state.session.streak = 0;
      updateSessionStats();
      state.game = null;
      setTimeout(() => showResult('failed', country), 200);
    } else {
      setTimeout(() => { input.className = 'answer-input'; input.value = ''; }, 500);
    }
    // Reset streak on wrong
    if (g.attempts < MAX_ATTEMPTS) {
      state.session.streak = 0;
      updateSessionStats();
    }
  }
}

function giveUp() {
  if (!state.game) return;
  stopTimer();
  const country = state.game.country;
  sendResult(state.game.type, 'wrong', country.key);
  state.session.streak = 0;
  updateSessionStats();
  state.game = null;
  showResult('failed', country);
}

// ══════════════════════════════════════════════════════════
//  HINTS  (safe progression — no Wikipedia, never reveals answer)
// ══════════════════════════════════════════════════════════
function showNextHint() {
  if (!state.game) return;
  const g = state.game;
  const btn = document.getElementById('hint-btn');

  const idx = g.shownHints;
  if (idx >= g.hints.length) {
    btn.textContent = T('hint_exhausted');
    btn.disabled = true;
    return;
  }

  const h = g.hints[idx];
  g.shownHints++;

  const sec = document.getElementById('hints-section');
  const div = document.createElement('div');
  div.className = 'hint-item';
  div.innerHTML = `<div class="hi-label">${h.label}</div>${h.text}`;
  sec.appendChild(div);
  sec.scrollIntoView({behavior:'smooth', block:'nearest'});

  if (g.shownHints >= g.hints.length) {
    btn.textContent = T('hint_exhausted');
    btn.disabled = true;
  }
}

function showResult(outcome, country) {
  const l = state.lang;
  const icons = {correct:'✅', failed:'❌', timeout:'⏰'};
  const titles = {correct:T('correct'), failed:T('failed'), timeout:T('timeout')};

  document.getElementById('res-icon').textContent = icons[outcome];
  document.getElementById('res-title').textContent = titles[outcome];
  document.getElementById('res-country').textContent =
    country.flag + '  ' + country.names[l];
  document.getElementById('res-sub').textContent =
    T('res_capital') + country.capital;

  const factEl = document.getElementById('res-fact');
  factEl.style.display = 'none';
  factEl.textContent = '';

  document.getElementById('result-overlay').classList.add('active');

  // Fetch Wikipedia fact in user's language, fall back to English
  const wikiLang = state.lang === 'ru' ? 'ru' : state.lang === 'uz' ? 'uz' : 'en';
  const wikiName = country.names[wikiLang] || country.names.en;
  const tryWiki = (lang, name) =>
    fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name.replace(/ /g,'_'))}`)
      .then(r => r.ok ? r.json() : Promise.reject());
  tryWiki(wikiLang, wikiName)
    .catch(() => wikiLang !== 'en' ? tryWiki('en', country.names.en) : Promise.reject())
    .then(d => {
      const ex = (d.extract||'').split('. ').filter(s=>s.length>20);
      if (ex.length) {
        factEl.textContent = ex.slice(0,2).join('. ') + '.';
        factEl.style.display = 'block';
      }
    }).catch(()=>{});
}

function closeResult(playAgain) {
  document.getElementById('result-overlay').classList.remove('active');
  document.getElementById('answer-input').className = 'answer-input';
  if (playAgain && state.game === null) {
    const lastType = document.getElementById('game-title').textContent;
    // Restart same game type - find type from title
    const typeMap = {};
    ['country','capital','flag','challenge'].forEach(t => {
      typeMap[T('game_' + t)] = t;
    });
    const type = Object.values({country:T('game_country'),capital:T('game_capital'),
      flag:T('game_flag'),challenge:T('game_challenge')})[0]; // fallback
    startGame(_lastGameType || 'country');
  } else {
    goHome();
  }
}

let _lastGameType = 'country';
const _origStartGame = startGame;

const _pendingResults = [];

function sendResult(gameType, result, countryKey) {
  _pendingResults.push({game: gameType, result, country: countryKey});
  // Try to post to API if available
  const uid = tg?.initDataUnsafe?.user?.id;
  if (!uid) return;
  fetch('/api/result', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      user_id: String(uid),
      username: tg?.initDataUnsafe?.user?.username || '',
      game_type: gameType === 'challenge' ? 'country' : gameType,
      result,
      country_uz: countryKey,
      init_data: tg?.initData || '',
    }),
  }).catch(() => {});
}

async function startMapGame() {

  if (!_worldData) {
    try {
      _worldData = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    } catch(e) { wrap.innerHTML = '<div style="padding:20px;color:var(--red)">Map unavailable</div>'; return; }
  }
  const w = wrap.clientWidth || 360, h = Math.max(220, Math.min(w*0.55, 320));
  wrap.innerHTML = '';
  const svg = d3.select(wrap).append('svg').attr('viewBox',`0 0 ${w} ${h}`);
  const proj = d3.geoNaturalEarth1().scale(w/6.5).translate([w/2, h/2]);
  const path = d3.geoPath().projection(proj);
  const countries = topojson.feature(_worldData, _worldData.objects.countries);
  const targetNum = ISO2_NUM[target.iso2];

  svg.selectAll('path')
    .data(countries.features)
    .enter().append('path')
    .attr('class', 'country-path')
    .attr('d', path)
    .attr('data-num', d => d.id)
    .on('click', function(event, d) { onMapClick(d.id, this); });
}

function _highlightCorrectOnMap(iso2, className) {
  const num = ISO2_NUM[iso2];
  if (!num) return;
  const el = document.querySelector(`[data-num="${num}"]`);
  if (el) { el.classList.add(className); el.scrollIntoView({behavior:'smooth', block:'nearest'}); }
}

function _showMapToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:40%;left:50%;transform:translateX(-50%);' +
    'background:rgba(0,0,0,.85);color:#fff;padding:14px 28px;border-radius:16px;' +
    'font-size:22px;z-index:300;text-align:center;animation:fadeIn .2s';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1800);
}

function onMapClick(numId, el) {
  if (!_mapGame) return;
  const iso2 = NUM_ISO2[numId];
  if (!iso2) return;
  const correct = _mapGame.country;

  if (iso2 === correct.iso2) {
    clearInterval(_mapGame.timerInterval);
    el.classList.add('correct-flash');
    record_result_map('country', 'correct', correct.key);
    state.session.correct++;
    state.session.streak++;
    if (state.session.streak > state.session.best) state.session.best = state.session.streak;
    updateSessionStats();
    _showMapToast('🎉 ' + (correct.names[state.lang] || correct.names.en) + '!');
    setTimeout(() => { _mapGame = null; showResult('correct', correct); }, 1800);
  } else {
    el.classList.add('wrong-flash');
    setTimeout(() => el.classList.remove('wrong-flash'), 600);
    _mapGame.attempts++;
    renderMapAttempts();
    if (_mapGame.attempts >= MAX_ATTEMPTS) {
      clearInterval(_mapGame.timerInterval);
      const save = _mapGame.country;
      _mapGame = null;
      state.session.streak = 0;
      updateSessionStats();
      _highlightCorrectOnMap(save.iso2, 'target');
      _showMapToast('📍 ' + (save.names[state.lang] || save.names.en));
      setTimeout(() => { showResult('failed', save); }, 1800);
    }
  }
}

function record_result_map(gameType, result, key) {
  sendResult(gameType, result, key);
}

function renderMapAttempts() {
  if (!_mapGame) return;
  const row = document.getElementById('map-attempts-row');
  row.innerHTML = '';
  for (let i = 0; i < MAX_ATTEMPTS; i++) {
    const d = document.createElement('div');
    d.className = 'attempt-dot ' + (i < _mapGame.attempts ? 'used' : 'remaining');
    row.appendChild(d);
  }
}

function startMapTimer() {
  if (!_mapGame) return;
  _mapGame.timerInterval = setInterval(() => {
    if (!_mapGame) return;
    const remaining = Math.max(0, _mapGame.timerEnd - Date.now());
    const pct = remaining / (_mapGame.timerMax * 1000) * 100;
    const bar = document.getElementById('map-timer-bar');
    const txt = document.getElementById('map-timer-text');
    if (!bar) return;
    bar.style.width = pct + '%';
    bar.className = 'timer-bar' + (pct<20?' danger':pct<40?' warn':'');
    const secs = Math.ceil(remaining/1000);
    txt.textContent = Math.floor(secs/60)+':'+String(secs%60).padStart(2,'0');
    if (remaining <= 0) {
      clearInterval(_mapGame.timerInterval);
      const c = _mapGame.country;
      _mapGame = null;
      state.session.streak = 0;
      updateSessionStats();
      _highlightCorrectOnMap(c.iso2, 'target');
      _showMapToast('📍 ' + (c.names[state.lang] || c.names.en));
      setTimeout(() => showResult('timeout', c), 1800);
    }
  }, 200);
}

function giveUpMap() {
  if (!_mapGame) { goHome(); return; }
  clearInterval(_mapGame.timerInterval);
  const c = _mapGame.country;
  _mapGame = null;
  state.session.streak = 0;
  updateSessionStats();
  _highlightCorrectOnMap(c.iso2, 'target');
  _showMapToast('📍 ' + (c.names[state.lang] || c.names.en));
  setTimeout(() => { showResult('failed', c); goHome(); }, 1800);
}

// ══════════════════════════════════════════════════════════
//  PERSISTENT STATS
// ══════════════════════════════════════════════════════════
function loadPersistentStats() {
  // Load from localStorage first (works offline and survives redeploys)
  try {
    const saved = JSON.parse(localStorage.getItem('geo_stats') || '{}');
    if ((saved.correct || 0) > 0) state.session.correct = saved.correct;
    if ((saved.best || 0) > 0) state.session.best = saved.best;
    if ((saved.streak || 0) > 0) state.session.streak = saved.streak;
    updateSessionStats();
  } catch(e) {}

  // Then sync with API if user is identified
  const uid = tg?.initDataUnsafe?.user?.id;
  if (!uid) return;
  fetch(`/api/stats?user_id=${uid}`)
    .then(r => r.json())
    .then(d => {
      const total = (d.correct_countries || 0) + (d.correct_capitals || 0);
      if (total > state.session.correct) state.session.correct = total;
      if ((d.best_streak || 0) > state.session.best) state.session.best = d.best_streak || 0;
      updateSessionStats();
    }).catch(()=>{});
}

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
renderHome();
loadPersistentStats();
</script>
